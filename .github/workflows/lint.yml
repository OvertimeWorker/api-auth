name: PR Lint
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_path: ${{ steps.strings.outputs.IMAGE_PATH }}
    steps:
      - id: strings
        run: |
          echo "IMAGE_PATH=$(echo ghcr.io/${{ github.repository_owner }}/node-ci | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare.outputs.image_path }}:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          prisma generate

      - name: Lint
        run: pnpm lint
