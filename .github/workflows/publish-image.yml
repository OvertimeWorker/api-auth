name: Build Base CI Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Name
        id: strings
        run: |
          echo "IMAGE_PATH=$(echo ghcr.io/${{ github.repository_owner }}/node-ci | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./base.Dockerfile
          push: true
          tags: ${{ steps.strings.outputs.IMAGE_PATH }}:latest
